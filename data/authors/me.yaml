bio: 
   Студент первого курса Российского университета дружбы народов имени Патриса Лумумбы. 
   
   <p class="indent">Интересы&#58; Рисование, программирование на линуксе, прослушивание музыки, просмотр сериалов, спорт. </p>
   
   <p class="indent">Образование&#58;  Имею полное среднее образование, подтвержденное аттестатом с отличием, выданным МБОУ "Нахабинская СОШ №2". В настоящее время являюсь студенткой и получаю высшее образование в РУДН.</p>
   <p class="indent">Навыки&#58; Отлично рисую, иногда программирую на линуксе и пайтоне.</p>
   <p class="indent">Опыт&#58; 5 лет в художественной школе, сдала ЕГЭ по информатике, математике и физике. </p>
   <p class="indent">Достижения&#58; Окончила школу с отличием и золотой медалью, дополнительно получила свидетельство об окончании школы искусств с отличием по программе дополнительного предпрофессионального образования в области изобразительного искусства. Дважды призер ВСОШ по МХК. Участвовала в различных выставках, олимпиадах. Сдала ЕГЭ и поступила в ВУЗ.</p>
